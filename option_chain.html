<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Option Chain</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#f5f5f5;
      font-family:Arial, sans-serif;
    }

    .topbar{
      background:#111827;
      color:white;
      padding:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button,select,input{
      padding:10px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button{
      cursor:pointer;
      background:#2563eb;
      color:white;
      border:none;
    }

    .danger{
      background:#dc2626;
    }

    .status{
      padding:10px;
      background:white;
      border-bottom:1px solid #ddd;
      font-size:14px;
    }

    .live{
      color:green;
      font-weight:bold;
    }

    .offline{
      color:red;
      font-weight:bold;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th{
      background:#111827;
      color:white;
      padding:10px;
      position:sticky;
      top:0;
    }

    td{
      padding:8px;
      text-align:center;
      border-bottom:1px solid #eee;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

    .up{
      color:green;
    }

    .down{
      color:red;
    }

    .atm{
      background:#fff3cd !important;
      font-weight:bold;
    }

    .metrics{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      padding:10px;
      background:#f3f4f6;
    }

    .metric{
      background:white;
      padding:10px;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    .metric h4{
      margin:0;
      font-size:12px;
      color:#666;
    }

    .metric p{
      margin:6px 0 0;
      font-size:20px;
      font-weight:bold;
    }

    #log{
      height:150px;
      overflow:auto;
      background:#111827;
      color:#00ff9d;
      padding:10px;
      font-size:12px;
      font-family:monospace;
    }
  </style>
</head>

<body>

<div class="topbar">

  <div>
    <h2>🚀 Live Option Chain</h2>
  </div>

  <div class="controls">

    <select id="symbol">
      <option value="NIFTY">NIFTY</option>
      <option value="BANKNIFTY">BANKNIFTY</option>
      <option value="SENSEX">SENSEX</option>
    </select>

    <input id="wsUrl" type="text">

    <button id="connectBtn">
      Connect
    </button>

    <button id="disconnectBtn" class="danger">
      Disconnect
    </button>

  </div>

</div>

<div class="status">
  Status:
  <span id="statusText" class="offline">
    Offline
  </span>
</div>

<div class="metrics">

  <div class="metric">
    <h4>Spot</h4>
    <p id="spotValue">-</p>
  </div>

  <div class="metric">
    <h4>ATM Strike</h4>
    <p id="atmValue">-</p>
  </div>

  <div class="metric">
    <h4>ATM Straddle</h4>
    <p id="straddleValue">-</p>
  </div>

  <div class="metric">
    <h4>PCR</h4>
    <p id="pcrValue">-</p>
  </div>

</div>

<table>

  <thead>
    <tr>
      <th>Strike</th>
      <th>Call LTP</th>
      <th>Call Change</th>
      <th>Put LTP</th>
      <th>Put Change</th>
      <th>Straddle</th>
    </tr>
  </thead>

  <tbody id="chainBody"></tbody>

</table>

<div id="log"></div>

<script>

const state = {

  ws: null,

  chain: new Map(),

  spot: 22400,

  symbol: "NIFTY",

  step: 50
};

const els = {

  wsUrl: document.getElementById("wsUrl"),

  connectBtn: document.getElementById("connectBtn"),

  disconnectBtn: document.getElementById("disconnectBtn"),

  chainBody: document.getElementById("chainBody"),

  statusText: document.getElementById("statusText"),

  symbol: document.getElementById("symbol"),

  spotValue: document.getElementById("spotValue"),

  atmValue: document.getElementById("atmValue"),

  straddleValue: document.getElementById("straddleValue"),

  pcrValue: document.getElementById("pcrValue"),

  log: document.getElementById("log")
};

function defaultWebSocketUrl(){

  if(location.protocol === "file:"){
    return "ws://127.0.0.1:8000/ws";
  }

  const protocol =
    location.protocol === "https:"
      ? "wss:"
      : "ws:";

  return `${protocol}//${location.host}/ws`;
}

els.wsUrl.value = defaultWebSocketUrl();

function log(message){

  const time =
    new Date().toLocaleTimeString();

  els.log.insertAdjacentHTML(
    "afterbegin",
    `<div>[${time}] ${message}</div>`
  );
}

function setStatus(text, live=false){

  els.statusText.textContent = text;

  els.statusText.className =
    live
      ? "live"
      : "offline";
}

function connectWebSocket(){

  disconnectWebSocket();

  const url = els.wsUrl.value;

  try{

    state.ws = new WebSocket(url);

  }catch(error){

    log(error.message);

    return;
  }

  log(`Connecting to ${url}`);

  setStatus("Connecting");

  state.ws.onopen = () => {

    setStatus("Connected", true);

    log("WebSocket connected");

    state.ws.send(JSON.stringify({

      action:"subscribe",

      symbol:state.symbol
    }));
  };

  state.ws.onmessage = (event) => {

    try{

      const payload =
        JSON.parse(event.data);

      if(Array.isArray(payload)){

        payload.forEach(processTick);

      }else{

        processTick(payload);
      }

    }catch(error){

      log(error.message);
    }
  };

  state.ws.onerror = () => {

    log("WebSocket error");

    setStatus("Error");
  };

  state.ws.onclose = () => {

    log("Disconnected");

    setStatus("Offline");

    setTimeout(() => {

      if(!state.ws || state.ws.readyState === WebSocket.CLOSED){

        log("Reconnecting...");

        connectWebSocket();
      }

    },3000);
  };
}

function disconnectWebSocket(){

  if(state.ws){

    state.ws.close();

    state.ws = null;
  }

  setStatus("Offline");
}

function processTick(tick){

  if(tick.spot){

    state.spot = Number(tick.spot);

    renderMetrics();

    return;
  }

  if(!tick.strike) return;

  const key =
    `${tick.strike}_${tick.type}`;

  state.chain.set(key,{

    strike:Number(tick.strike),

    type:tick.type,

    ltp:Number(tick.ltp || 0),

    prev:Number(
      tick.previous_close || 0
    ),

    oi:Number(tick.oi || 0)
  });

  renderTable();
}

function getLeg(strike,type){

  return state.chain.get(
    `${strike}_${type}`
  ) || {

    ltp:0,

    prev:0,

    oi:0
  };
}

function atmStrike(){

  return Math.round(
    state.spot / state.step
  ) * state.step;
}

function renderMetrics(){

  const atm = atmStrike();

  const ce = getLeg(atm,"CE");

  const pe = getLeg(atm,"PE");

  els.spotValue.textContent =
    state.spot.toFixed(2);

  els.atmValue.textContent =
    atm;

  els.straddleValue.textContent =
    (ce.ltp + pe.ltp).toFixed(2);

  let callOi = 0;

  let putOi = 0;

  state.chain.forEach(v => {

    if(v.type === "CE") callOi += v.oi;

    if(v.type === "PE") putOi += v.oi;
  });

  els.pcrValue.textContent =
    callOi
      ? (putOi / callOi).toFixed(2)
      : "-";
}

function renderTable(){

  const atm = atmStrike();

  const strikes = [];

  for(
    let s = atm - 1000;
    s <= atm + 1000;
    s += state.step
  ){

    strikes.push(s);
  }

  els.chainBody.innerHTML =
    strikes.map(strike => {

      const ce = getLeg(strike,"CE");

      const pe = getLeg(strike,"PE");

      const ceChg =
        ce.ltp - ce.prev;

      const peChg =
        pe.ltp - pe.prev;

      return `

      <tr class="${strike===atm?'atm':''}">

        <td>${strike}</td>

        <td>${ce.ltp.toFixed(2)}</td>

        <td class="${ceChg>=0?'up':'down'}">
          ${ceChg.toFixed(2)}
        </td>

        <td>${pe.ltp.toFixed(2)}</td>

        <td class="${peChg>=0?'up':'down'}">
          ${peChg.toFixed(2)}
        </td>

        <td>
          ${(ce.ltp + pe.ltp).toFixed(2)}
        </td>

      </tr>

      `;
    }).join("");

  renderMetrics();
}

els.connectBtn.onclick =
  connectWebSocket;

els.disconnectBtn.onclick =
  disconnectWebSocket;

els.symbol.onchange = () => {

  state.symbol = els.symbol.value;

  log(`Changed symbol to ${state.symbol}`);

  if(state.ws){

    state.ws.send(JSON.stringify({

      action:"subscribe",

      symbol:state.symbol
    }));
  }
};

renderTable();

setTimeout(() => {

  connectWebSocket();

},1000);

</script>

</body>
</html>
